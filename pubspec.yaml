name: wealth_wise
description: "A personal finance management app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.6
  
  # Firebase packages for authentication and storage
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.7
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^6.2.0
  
  # State management
  provider: ^6.1.2
  
  # Local storage and database
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  
  # UI components
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  intl: ^0.19.0
  image_picker: ^1.0.7
  local_auth: ^2.1.8
  
  # Utilities
  uuid: ^4.3.3
  
  # New utilities for enhanced settings screen
  url_launcher: ^6.2.5
  package_info_plus: ^8.3.0
  
  # Localization
  flutter_localizations:
    sdk: flutter 
  flutter_lints: ^3.0.1
  logging: ^1.2.0
  flutter_secure_storage: ^9.0.0
  google_mobile_ads: ^5.3.1
  in_app_purchase: ^3.2.1
  in_app_purchase_android: ^0.4.0+1
  in_app_purchase_storekit: ^0.3.21
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

# The "flutter_lints" package below contains a set of recommended lints to
# encourage good coding practices. The lint set provided by the package is
# activated in the `analysis_options.yaml` file located at the root of your
# package. See that file for information about deactivating specific lint
# rules and activating additional ones.
flutter_lints: ^2.0.0

# For information on the generic Dart part of this file, see the
